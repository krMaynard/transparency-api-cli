name: dsa-transparency
display_name: DSA VLOP Transparency
description: Query the aggregated EU Digital Services Act VLOP transparency reports (tables 3–11) with a structured no-SQL query model over an async 202 + poll job API.
category: other
spec_url: https://transparency.kieranmaynard.com/openapi.json
spec_format: json
openapi_version: "3.1"
tier: official
spec_source: official
verified_date: "2026-06-17"
homepage: https://transparency.kieranmaynard.com
auth_key_url: https://transparency.kieranmaynard.com/portal
auth_required: true
auth_instructions: Sign in at the researcher portal to mint an API key, then pass it as the X-API-Key header.
regions:
  - EU
api_language: en
notes: |
  Distinct async-job blueprint: POST /api/query returns 202 + job_id, the client
  polls GET /api/jobs/{id} until status=done, then fetches
  GET /api/jobs/{id}/result (json or csv). The only async 202 + poll job API in
  the catalog — every other entry is synchronous request/response REST.

  Query model is structured params, never SQL: a request names a table (one of
  the 9 DSA report tables, GET /api/tables), then a boolean and/or/not clause of
  {operation, field_name, field_values} plus group_by, aggregates, sort, and
  max_count. The server validates each field/operation against that table's fixed
  registry and compiles a single parameterised SELECT. Composite cross-table
  queries are also supported (legs + join_on + derived ratios + having).

  Auth is an X-API-Key header (APIKeyHeader securityScheme). Discovery endpoints
  are public and unauthenticated (GET /api/overview, GET /api/explore/options,
  POST /api/explore), while the core job surface (POST /api/query,
  GET/DELETE /api/jobs/...) and the NL POST /api/ask endpoint need a key. Done
  jobs also expose HMAC-signed download URLs (GET /api/jobs/{id}/download) that
  authorise a download without a key. The spec's first server is the public
  deployment, so no base_url override is needed.

  Data: content-moderation statistics for the 33 designated EU DSA Very Large
  Online Platforms / Search Engines (H2 2025), tables 3–11 of the DSA
  Implementing Regulation reporting template.
